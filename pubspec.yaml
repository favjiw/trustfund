name: trustfund
description: "TrustFund mobile app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo/

# Run `flutter pub get` then `dart run flutter_launcher_icons`
# to (re)generate the Android, iOS and web launcher icons.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo/trustfund_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/trustfund_icon.png"
  web:
    generate: true
    image_path: "assets/logo/trustfund_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#2563EB"
